# Render.com Blueprint — tek tıkla deploy (ücretsiz plan).
# Repo'yu Render'a bağla, "New +" > "Blueprint" seç; bu dosyayı okur.
services:
  - type: web
    name: aile-oyun-salonu
    runtime: node
    plan: free
    # NODE_ENV=production iken `npm install` devDependencies'i (vite, tsc)
    # atlar; --include=dev ile build araçları yine kurulur.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
